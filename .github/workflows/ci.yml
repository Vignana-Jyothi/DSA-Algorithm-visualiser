name: CI/CD — DSA Visualiser

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 1: Lint + Build check (runs on every push & PR)
  # ─────────────────────────────────────────────────────────────────
  lint-and-build:
    name: Lint & Build
    runs-on: self-hosted       # ← your self-hosted runner
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || true

      - name: Build production bundle
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────
  # Job 2: Docker build & deploy (only on push to main/master)
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: Docker Build & Deploy
    runs-on: self-hosted
    needs: lint-and-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --target runner \
            -t dsa-visualiser:latest \
            -t dsa-visualiser:${{ github.sha }} \
            .

      - name: Stop & remove old container (if running)
        run: |
          docker stop dsa-visualiser 2>/dev/null || true
          docker rm   dsa-visualiser 2>/dev/null || true

      - name: Run new container
        run: |
          docker run -d \
            --name dsa-visualiser \
            --restart unless-stopped \
            -p 3319:3000 \
            dsa-visualiser:latest

      - name: Health check
        run: |
          echo "Waiting for container to start..."
          sleep 5
          curl -f http://localhost:80 || (echo "Health check failed!" && exit 1)

      - name: Clean up old images
        run: |
          docker image prune -f